---
name: Dashboard Web
version: "0.3.0"
slug: dashboard-web
description: >-
  Custom Home Assistant dashboard — chat with Claude, real-time entity control,
  per-room views, camera streams and media player controls.
url: https://github.com/neocjara/dashboard-web-addon
# Prebuilt multi-arch image published by the dashboard-web repo CI on tag
# push. Supervisor pulls this directly when an end user installs the add-on
# from the catalog. For local development via deploy-local.sh, this line is
# stripped on the HAOS side so Supervisor builds from the synced source tree.
image: ghcr.io/neocjara/dashboard-web
arch:
  - amd64
  - aarch64
init: false
startup: application
boot: auto
homeassistant_api: true
ingress: true
ingress_port: 3001
panel_icon: mdi:view-dashboard
panel_title: Dashboard
options:
  log_level: info
  anthropic_api_key: ""
  anthropic_model: claude-sonnet-4-6
schema:
  log_level: list(debug|info|warn|error)
  anthropic_api_key: password
  anthropic_model: match(^claude-[a-z0-9-]+$)
